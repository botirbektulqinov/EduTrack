name: ci

on:
  push:
    branches:
      - main
      - botir
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci-db-${{ github.run_id }}-${{ github.run_attempt }}
          POSTGRES_DB: edu_track
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:ci-db-${{ github.run_id }}-${{ github.run_attempt }}@127.0.0.1:5432/edu_track
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:ci-db-${{ github.run_id }}-${{ github.run_attempt }}@127.0.0.1:5432/edu_track
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/1
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/2
      SECRET_KEY: ci-secret-${{ github.run_id }}-${{ github.run_attempt }}-validation-only-0123456789abcdef
      JWT_SECRET_KEY: ci-jwt-${{ github.run_id }}-${{ github.run_attempt }}-validation-only-0123456789abcdef
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:8000
      ENVIRONMENT: development
      DEBUG: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Compile backend
        run: python -m compileall app

      - name: Import application
        run: python -c "from app.main import app; print('app import ok')"

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build
