name: ci

on:
  push:
    branches:
      - main
      - botir
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: edu_track
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres@127.0.0.1:5432/edu_track
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres@127.0.0.1:5432/edu_track
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/1
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/2
      TEST_REDIS_URL: redis://127.0.0.1:6379/15
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:8000
      ENVIRONMENT: development
      DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Compile backend
        run: python -m compileall app

      - name: Import application
        run: python -c "from app.main import app; print('app import ok')"

      - name: Run backend tests
        env:
          EDUTRACK_RUN_DB_TESTS: "1"
          TEST_DATABASE_URL: postgresql+asyncpg://postgres@127.0.0.1:5432/edu_track
          TEST_REDIS_URL: redis://127.0.0.1:6379/15
        run: pytest

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        working-directory: frontend
        run: npm run test:e2e

  e2e-real:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: edu_track_e2e
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres@127.0.0.1:5432/edu_track_e2e
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres@127.0.0.1:5432/edu_track_e2e
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/1
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/2
      FRONTEND_URL: http://127.0.0.1:3000
      BACKEND_URL: http://127.0.0.1:8000
      ENVIRONMENT: development
      DEBUG: "false"
      RATE_LIMIT_ENABLED: "false"
      E2E_BASE_URL: http://127.0.0.1:3000
      E2E_API_URL: http://127.0.0.1:8000/api/v1
      E2E_PASSWORD: E2EPassword123!

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Seed E2E schema and data
        run: python scripts/seed_e2e.py

      - name: Run migrations
        run: alembic upgrade head

      - name: Start backend
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > backend-e2e.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:8000/health/live && exit 0
            sleep 2
          done
          cat backend-e2e.log
          exit 1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run real backend Playwright E2E
        working-directory: frontend
        run: npm run test:e2e:real
