services:
  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: "production"
      DEBUG: "false"
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:?Set DATABASE_URL_SYNC}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:?Set CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:?Set CELERY_RESULT_BACKEND}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL:?Set FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL:?Set BACKEND_URL}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-false}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      ALLOW_PASSWORD_RESET_SIGNED_FALLBACK: ${ALLOW_PASSWORD_RESET_SIGNED_FALLBACK:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-/ws}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${FRONTEND_HTTP_BIND:-127.0.0.1:8080}:80"

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  celery_worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: "production"
      DEBUG: "false"
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:?Set DATABASE_URL_SYNC}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:?Set CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:?Set CELERY_RESULT_BACKEND}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL:?Set FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL:?Set BACKEND_URL}
    command: celery -A app.workers.celery_app worker -l info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: "production"
      DEBUG: "false"
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:?Set DATABASE_URL_SYNC}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:?Set CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:?Set CELERY_RESULT_BACKEND}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL:?Set FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL:?Set BACKEND_URL}
    command: celery -A app.workers.celery_app beat -l info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
